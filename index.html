// Hitter ops
function addPitchToHitter(bid,abIdx,pitch){
updateList(getList().map(function(b){
if(b.id!==bid)return b;
return Object.assign({},b,{atBats:b.atBats.map(function(ab,i){
if(i!==abIdx)return ab;
return Object.assign({},ab,{pitches:ab.pitches.concat([pitch])});
})});
}));
}
function addNoteToHitter(bid,abIdx,note){

if(b.id!==bid)return b;
return Object.assign({},b,{atBats:b.atBats.map(function(ab,i){
if(i!==abIdx)return ab;
return Object.assign({},ab,{notes:ab.notes.concat([note])});

}

// Lineup
function getLineup(){
if(!S.game)return[];
var key=(S.side===‚Äúour‚Äù?‚Äúour‚Äù:‚Äútheir‚Äù)+‚ÄúLineupOrder‚Äù;
var order=S.game[key]||[];
var list=getList(S.side,‚Äúhitters‚Äù);
var ids=list.map(function(b){return b.id;});
var valid=order.filter(function(id){return ids.indexOf(id)>=0;});
ids.forEach(function(id){if(valid.indexOf(id)<0)valid.push(id);});
return valid;
}
function saveLineup(order){
var key=(S.side===‚Äúour‚Äù?‚Äúour‚Äù:‚Äútheir‚Äù)+‚ÄúLineupOrder‚Äù;
var g=Object.assign({},S.game);g[key]=order;updateGame(g);
}
function moveUp(id){var o=getLineup().slice(),i=o.indexOf(id);if(i<=0)return;var tmp=o[i-1];o[i-1]=o[i];o[i]=tmp;saveLineup(o);}
function moveDown(id){var o=getLineup().slice(),i=o.indexOf(id);if(i<0||i>=o.length-1)return;var tmp=o[i+1];o[i+1]=o[i];o[i]=tmp;saveLineup(o);}

// Sub
function confirmSub(){
var m=S.subModal;
if(!m||!m.subName||!m.subName.trim())return;
var key=lk(S.side,‚Äúhitters‚Äù);
var list=getList(S.side,‚Äúhitters‚Äù);
var forB=null;for(var i=0;i<list.length;i++)if(list[i].id===m.forId){forB=list[i];break;}
if(!forB)return;
var subId=Date.now();
var subP={id:subId,name:m.subName.trim(),atBats:[{pitches:[],notes:[],inning:m.inning||1}],subFor:forB.name,subType:m.subType};
var newList,newOrder;
if(m.subType===‚Äúonetime‚Äù){
newList=list.map(function(b){return b.id===m.forId?Object.assign({},b,{subbedOutBy:subId}):b;});
newList=newList.concat([subP]);
newOrder=getLineup().slice();
var idx=newOrder.indexOf(m.forId);
if(idx>=0)newOrder.splice(idx+1,0,subId);else newOrder.push(subId);
}else{
newList=list.map(function(b){return b.id===m.forId?Object.assign({},b,{removedBy:m.subName.trim()}):b;});
newList=newList.concat([subP]);
newOrder=getLineup().map(function(id){return id===m.forId?subId:id;});
}
var g=Object.assign({},S.game);
g[key]=newList;
g[(S.side===‚Äúour‚Äù?‚Äúour‚Äù:‚Äútheir‚Äù)+‚ÄúLineupOrder‚Äù]=newOrder;
setSelId(subId);S.subModal=null;S.abIdx=0;
updateGame(g);
}

function buildSpray(plays,interactive){
